<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشروعي - ربح النقاط</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        .points {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
        }
        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="text-align:center;">💰 رصيد النقاط</div>
        <div class="points" id="points">0</div>
        <div style="text-align:center;">≈ <span id="usd">0</span> USDT (1000 نقطة = 1$)</div>
    </div>

    <div class="card">
        <h3>📺 روابط إعلانية</h3>
        <div id="linksList">جاري التحميل...</div>
        <button onclick="fetchLinks()">🔄 تحديث الروابط</button>
    </div>

    <div class="card">
        <h3>👥 الإحالات</h3>
        <button onclick="copyReferral()">🔗 نسخ رابط الإحالة</button>
        <p id="refCount">👥 مدعوين: 0</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let userId = tg.initDataUnsafe?.user?.id;
        let points = 0;

        function updateUI() {
            document.getElementById('points').innerText = points;
            document.getElementById('usd').innerText = (points / 1000).toFixed(2);
        }

        async function fetchLinks() {
            // هنا تجيب الروابط من البوت
            let links = [
                { title: "📢 إعلان 1", reward: 5, url: "https://example.com/1" },
                { title: "🎬 إعلان 2", reward: 10, url: "https://example.com/2" }
            ];
            let html = '';
            for(let link of links) {
                html += `<div class="task">
                    <span>${link.title} (+${link.reward})</span>
                    <button onclick="watchLink('${link.url}', ${link.reward})">مشاهدة</button>
                </div>`;
            }
            document.getElementById('linksList').innerHTML = html || "لا توجد روابط حالياً";
        }

        function watchLink(url, reward) {
            window.open(url, '_blank');
            points += reward;
            updateUI();
            tg.sendData(JSON.stringify({action: 'add_points', amount: reward, reason: 'مشاهدة إعلان'}));
            tg.showAlert(`✅ +${reward} نقطة!`);
        }

        function copyReferral() {
            let link = `https://t.me/YOUR_BOT_USERNAME?start=ref_${userId}`;
            navigator.clipboard.writeText(link);
            tg.showAlert('✅ تم نسخ رابط الإحالة');
        }

        fetchLinks();
        updateUI();
    </script>
</body>
</html>

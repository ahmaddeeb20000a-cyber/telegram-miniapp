<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مهامي - ربح النقاط</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .task-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
        }
        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .youtube-player {
            margin: 10px 0;
            border-radius: 15px;
            overflow: hidden;
        }
        .hidden { display: none; }
        .status { font-size: 12px; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>

<div class="balance-card">
    <div>💰 رصيدك</div>
    <div class="balance" id="balance">0</div>
    <div>≈ <span id="usd">0</span> USDT</div>
</div>

<div id="tasksContainer"></div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let userId = tg.initDataUnsafe?.user?.id;
    let points = 0;
    let completedTasks = [];
    
    // تحميل الرصيد من البوت (اختياري، يمكن استلامه من البوت)
    function updateBalanceUI() {
        document.getElementById('balance').innerText = points;
        document.getElementById('usd').innerText = (points / 1000).toFixed(2);
    }
    
    // إرسال إكمال مهمة إلى البوت
    function completeTask(taskId) {
        tg.sendData(JSON.stringify({ action: 'complete_task', task_id: taskId }));
        tg.showAlert('✅ جارٍ التحقق من إتمام المهمة...');
    }
    
    // مشاهدة فيديو يوتيوب مع مؤقت 30 ثانية
    let player;
    let currentTaskId = null;
    let timerStarted = false;
    
    function onYouTubeIframeAPIReady() {
        // سيتم إنشاء اللاعب عند الضغط على المهمة
    }
    
    function watchYouTube(taskId, videoUrl, reward) {
        currentTaskId = taskId;
        // استخراج ID الفيديو من الرابط
        let videoId = extractVideoId(videoUrl);
        if (!videoId) {
            tg.showAlert('رابط الفيديو غير صالح');
            return;
        }
        
        // إنشاء نافذة منبثقة لعرض الفيديو
        let modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.9)';
        modal.style.zIndex = '1000';
        modal.style.display = 'flex';
        modal.style.flexDirection = 'column';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
        
        let container = document.createElement('div');
        container.style.width = '100%';
        container.style.maxWidth = '400px';
        container.style.backgroundColor = '#000';
        container.style.borderRadius = '15px';
        container.style.overflow = 'hidden';
        
        let iframe = document.createElement('iframe');
        iframe.width = '100%';
        iframe.height = '250';
        iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1`;
        iframe.frameBorder = '0';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        
        let timerDiv = document.createElement('div');
        timerDiv.style.padding = '15px';
        timerDiv.style.textAlign = 'center';
        timerDiv.style.color = 'white';
        timerDiv.innerHTML = '⏳ يرجى مشاهدة الفيديو لمدة 30 ثانية... <span id="timer">0</span>/30';
        
        let completeBtn = document.createElement('button');
        completeBtn.innerText = '✅ تمت المشاهدة';
        completeBtn.style.margin = '10px';
        completeBtn.disabled = true;
        completeBtn.onclick = () => {
            document.body.removeChild(modal);
            completeTask(taskId);
        };
        
        container.appendChild(iframe);
        container.appendChild(timerDiv);
        container.appendChild(completeBtn);
        modal.appendChild(container);
        document.body.appendChild(modal);
        
        // بدء المؤقت
        let seconds = 0;
        let interval = setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = seconds;
            if (seconds >= 30) {
                clearInterval(interval);
                completeBtn.disabled = false;
                timerDiv.innerHTML = '✅ يمكنك الآن إكمال المهمة';
            }
        }, 1000);
    }
    
    function extractVideoId(url) {
        let patterns = [
            /(?:youtube\.com\/watch\?v=)([^&]+)/,
            /(?:youtu\.be\/)([^?]+)/,
            /(?:youtube\.com\/embed\/)([^?]+)/
        ];
        for (let p of patterns) {
            let match = url.match(p);
            if (match) return match[1];
        }
        return null;
    }
    
    // فتح رابط مباشر
    function openDirectLink(taskId, url, reward) {
        window.open(url, '_blank');
        tg.showAlert('🔗 تم فتح الرابط، اضغط "تم" بعد فتحه');
        // بعد 5 ثوانٍ نعطي خيار إكمال المهمة
        setTimeout(() => {
            tg.showPopup({
                title: 'هل فتحت الرابط؟',
                message: `إذا كنت قد فتحت الرابط، اضغط "نعم" لاستلام ${reward} نقطة`,
                buttons: [{type: 'ok', text: 'نعم'}, {type: 'cancel', text: 'لا'}]
            }, (btnId) => {
                if (btnId === 'ok') {
                    completeTask(taskId);
                }
            });
        }, 3000);
    }
    
    // الاشتراك في قناة
    function joinChannel(taskId, channelUrl, reward) {
        window.open(channelUrl, '_blank');
        tg.showAlert('📢 اشترك في القناة، ثم اضغط "تم"');
        setTimeout(() => {
            tg.showPopup({
                title: 'هل اشتركت؟',
                message: `بعد الاشتراك، اضغط "نعم" لاستلام ${reward} نقطة`,
                buttons: [{type: 'ok', text: 'نعم'}, {type: 'cancel', text: 'لا'}]
            }, (btnId) => {
                if (btnId === 'ok') {
                    completeTask(taskId);
                }
            });
        }, 5000);
    }
    
    // عرض المهام
    async function loadTasks() {
        // مهام ثابتة كمثال
        const tasks = [
            { id: "task1", type: "youtube", name: "🎬 شاهد فيديو يوتيوب", target: "https://youtu.be/0O2UNRSFWSY?si=g8w82cygunrMZK1f", reward: 10 },
            { id: "task2", type: "direct_link", name: "🔗 افتح الرابط المباشر", target: "https://omg10.com/4/10881167", reward: 5 },
            { id: "task3", type: "channel", name: "📢 اشترك في القناة", target: "https://t.me/masda1102", reward: 15 }
        ];
        
        let container = document.getElementById('tasksContainer');
        container.innerHTML = '';
        
        for (let task of tasks) {
            let card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${task.name}</strong>
                        <div class="status">+${task.reward} نقطة</div>
                    </div>
                    <button class="task-btn" data-id="${task.id}" data-type="${task.type}" data-target="${task.target}" data-reward="${task.reward}">ابدأ</button>
                </div>
            `;
            container.appendChild(card);
        }
        
        // إضافة أحداث الأزرار
        document.querySelectorAll('.task-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = btn.getAttribute('data-id');
                let type = btn.getAttribute('data-type');
                let target = btn.getAttribute('data-target');
                let reward = parseInt(btn.getAttribute('data-reward'));
                
                if (type === 'youtube') {
                    watchYouTube(id, target, reward);
                } else if (type === 'direct_link') {
                    openDirectLink(id, target, reward);
                } else if (type === 'channel') {
                    joinChannel(id, target, reward);
                }
            });
        });
    }
    
    loadTasks();
    updateBalanceUI();
    
    // استقبال تحديث الرصيد من البوت (اختياري)
    tg.onEvent('mainButtonClicked', () => {});
</script>
</body>
</html>

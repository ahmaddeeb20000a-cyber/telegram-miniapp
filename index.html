<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشروعي - الاحترافي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .user-info h3 { font-size: 18px; }
        .user-info p { font-size: 12px; opacity: 0.7; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .points {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            margin: 8px 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.97); }
        .lang-select {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="profile">
        <div class="avatar" id="avatar">👤</div>
        <div class="user-info">
            <h3 id="userName">Loading...</h3>
            <p id="userID">@username</p>
        </div>
        <select id="language" class="lang-select" onchange="changeLanguage()">
            <option value="ar">🇸🇦 العربية</option>
            <option value="en">🇬🇧 English</option>
        </select>
    </div>

    <div class="card">
        <div class="points" id="points">0</div>
        <div style="text-align:center;">≈ <span id="usd">0</span> USDT</div>
    </div>

    <div class="card">
        <h3 id="tasksTitle">📋 المهام</h3>
        <div id="tasksList"></div>
    </div>

    <div class="card">
        <h3 id="withdrawTitle">💸 السحب</h3>
        <button id="withdrawBtn" onclick="requestWithdraw()">💸 سحب USDT</button>
    </div>
